<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABHIMO Studio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Glow Animation -->
    <div class="bg-animation"></div>

    <!-- Floating Music Symbols -->
    <div id="music-bg"></div>


    <!-- MAIN APP -->
    <div class="studio">

        <!-- TOP HEADER -->
        <div class="top-bar">

            <!-- LEFT LOGO -->
            <h1 class="logo">🎵 ABHIMO STUDIO</h1>

        </div>


        <!-- DISPLAY SECTION -->
        <div class="screen">

            <div id="display">OFF</div>

            <div id="recordingStatus">
                ⚪ Ready
            </div>

        </div>


        <!-- CONTROL PANEL -->
        <div class="controls">

            <!-- VOLUME -->
            <div class="control-box">

                <h3>VOLUME</h3>

                <button id="volUp">＋</button>

                <button id="volDown">－</button>

            </div>


            <!-- TONE -->
            <div class="control-box">

                <h3>TONE</h3>

                <button id="toneUp">＋</button>

                <button id="toneDown">－</button>

            </div>


            <!-- NOTE -->
            <div class="control-box">

                <h3>NOTE</h3>

                <button id="noteBtn">PA</button>

            </div>


            <!-- PITCH -->
            <div class="control-box">

                <h3>PITCH</h3>

                <button id="pitchUp">＋</button>

                <button id="pitchDown">－</button>

            </div>

        </div>


        <!-- POWER BUTTON -->
        <div class="power-section">

            <button id="powerBtn">
                ⏻ POWER
            </button>

        </div>


        <!-- RECORD SECTION -->
        <div class="record-section">

            <button id="recordBtn">
                🎙 RECORD
            </button>

            <button id="stopBtn">
                ⏹ STOP
            </button>

        </div>


        <!-- EXTRA -->
        <div class="extra-controls">

            <button class="extra">
                MEMORY
            </button>

            <button class="extra">
                MODE
            </button>

        </div>

<!-- STREAK STATUS BAR -->

<div class="status-bar">

    <a href="streak.html" id="dayStreak">
    🔥 0 Day Streak
</a>
    <span id="badgeBox">
        🏅 Beginner
    </span>

</div>

        <!-- FOOTER -->
        <div class="footer">
            Professional Shruthi Experience • Auto Save • Studio Quality
        </div>

    </div>


    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
